<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title"       content="Check if Nickie is on plane game" />
  <meta property="og:type"        content="website" />
  <title>is he on plane game?</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #333333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ededed;
    }

    .card {
      background: #707070;
      border-radius: 16px;
      padding: 48px 40px 36px;
      width: min(400px, 92vw);
      box-shadow: 0 4px 40px rgba(60, 100, 200, 0.10);
    }

    .cid {
      font-size: 32px;
      font-weight: 300;
      margin-bottom: 36px;
    }

    hr {
      border: none;
      border-top: 1px solid #7a7a7a;
      margin-bottom: 28px;
    }

    .status-area {
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #8aa0cc;
      font-size: 14px;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #d0dcf7;
      border-top-color: #3b6ef8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .pill.online  { background: #2a6e40; color: #ededed; border: 2px solid #444444; }
    .pill.offline { background: #8b2020; color: #ededed; border: 2px solid #444444; }

    .position-name {
      font-size: 11px;
      font-weight: 400;
      color: #b0bedd;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
    }

    .status-label {
      font-size: 22px;
      font-weight: 300;
      margin-bottom: 20px;
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      font-size: 13.5px;
    }

    .key { color: #d0d0d0; }
    .val { color: #ededed; text-align: right; max-width: 60%; }

    .btn {
      margin-top: 32px;
      width: 100%;
      padding: 12px;
      background: #444444;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .updated {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #b0bedd;
    }

    /* ✅ FLAG FIX */
    .flag {
      width: 18px;
      height: 12px;
      object-fit: cover;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
      border-radius: 2px;
    }
  </style>

</head>

<body>

<div class="card">
  <div class="cid">Is Nickie on plane game?</div>
  <hr />

  <div class="status-area" id="status-area">
    <div class="loading">
      <div class="spinner"></div>
      Checking status…
    </div>
  </div>

<button class="btn" onclick="checkStatus()">Refresh</button>

  <div class="updated" id="updated"></div>
</div>

<script>
const CID = 1778154;
const API = 'https://data.vatsim.net/v3/vatsim-data.json';

const POSITION_NAMES = {
  "EBKT_I_TWR":  "Kortrijk Information",

  "EBAW_GND": "Antwerpen Ground",
  "EBAW_TWR": "Antwerpen Tower",

  "EBBR_DEL": "Brussels Delivery",
  "EBBR_GND": "Brussels Ground",
  "EBBR_C_GND": "Brussels Ground",
  "EBBR_S_GND": "Brussels Ground",
  "EBBR_TWR": "Brussels Tower",
  "EBBR_N_TWR": "Brussels Tower",
  "EBBR_APP": "Brussels Arrival",
  "EBBR_DEP": "Brussels Departure",
  "EBBR_F_APP": "Brussels Approach",

  "EBCI_GND": "Charleroi Ground",
  "EBCI_TWR": "Charleroi Tower",
  "EBCI_APP": "Charleroi Approach",

  "EBLG_GND": "Liège Ground",
  "EBLG_TWR": "Liège Tower",
  "EBLG_APP": "Liège Approach",

  "EBOS_GND": "Oostende Ground",
  "EBOS_TWR": "Oostende Tower",
  "EBOS_APP": "Oostende Approach",

  "ELLX_DEL": "Luxembourg Delivery",
  "ELLX_TWR": "Luxembourg Tower",
  "ELLX_APP": "Luxembourg Radar",
  "ELLX_F_APP": "Luxembourg Arrival"
};

function getPositionName(callsign) {
  return POSITION_NAMES[callsign] ?? null;
}

/* ✅ FLAG FUNCTION */
function getFlag(callsign) {
  if (callsign.startsWith("EL")) {
    return '<img src="flags/lu.png" class="flag">';
  }
  if (callsign.startsWith("EB")) {
    return '<img src="flags/be.png" class="flag">';
  }
  return '';
}

function timeSince(logonTime) {
  const s = Math.floor((Date.now() - new Date(logonTime)) / 1000);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function rows(pairs) {
  return pairs.map(([k, v, keyStyle]) => `
    <div class="info-item">
      <span class="${keyStyle ?? 'key'}">${k}</span>
      <span class="val">${v}</span>
    </div>
  `).join('');
}

function renderOnline(entry, type) {
  const fp = entry.flight_plan;

  const positionName = type === 'atc' ? getPositionName(entry.callsign) : null;

  const pairs = type === 'pilot'
    ? [
        ['Position', `${getFlag(entry.callsign)}${entry.callsign}`],
        fp ? ['Route', `${fp.departure} → ${fp.arrival}`] : null,
        fp?.aircraft_short ? ['Aircraft', fp.aircraft_short] : null,
        ['Altitude', `${Number(entry.altitude).toLocaleString()} ft`],
        ['Ground speed', `${entry.groundspeed} kt`],
        ['Online for', timeSince(entry.logon_time)],
      ].filter(Boolean)
    : [
        [positionName ?? 'Position', `${getFlag(entry.callsign)}${entry.callsign}`, positionName ? 'val' : 'key'],
        ['Frequency', entry.frequency],
        ['Online for', timeSince(entry.logon_time)],
      ];

  return `
    <div class="pill online">YES HE IS!</div>
    <div class="status-label">${type === 'pilot' ? 'Flying' : 'Controlling'}</div>
    <div class="info-list">${rows(pairs)}</div>
  `;
}

function renderOffline() {
  return `
    <div class="pill offline">NO HE ISN'T!</div>
    <div class="status-label" style="color:#ededed;">He's not connected</div>
  `;
}

async function checkStatus() {
  const area = document.getElementById('status-area');
  area.innerHTML = `<div class="loading"><div class="spinner"></div>Checking...</div>`;

  try {
    const res = await fetch(API);
    const data = await res.json();

    const pilot = data.pilots.find(p => p.cid === CID);
    const atc   = data.controllers.find(c => c.cid === CID);

    area.innerHTML = pilot ? renderOnline(pilot, 'pilot')
                   : atc   ? renderOnline(atc, 'atc')
                   : renderOffline();

  } catch {
    area.innerHTML = `<div>Error loading data</div>`;
  }
}

checkStatus();
</script>

</body>
</html>
