<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>is he on plane game?</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a2a4a;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px 36px;
      width: min(400px, 92vw);
      box-shadow: 0 4px 40px rgba(60, 100, 200, 0.10);
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8aa0cc;
      margin-bottom: 8px;
    }

    .cid {
      font-size: 32px;
      font-weight: 300;
      color: #1a2a4a;
      letter-spacing: -0.5px;
      margin-bottom: 36px;
    }

    .cid span {
      color: #3b6ef8;
    }

    hr {
      border: none;
      border-top: 1px solid #e8eef8;
      margin-bottom: 28px;
    }

    .status-area {
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #8aa0cc;
      font-size: 14px;
      font-weight: 300;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #d0dcf7;
      border-top-color: #3b6ef8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    .pill.online  { background: #e8f5ec; color: #2a9a50; }
    .pill.offline { background: #faeaea; color: #c0392b; }
    .pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .pill.online  .dot { background: #2a9a50; }
    .pill.offline .dot { background: #c0392b; }

    .status-label {
      font-size: 22px;
      font-weight: 300;
      color: #1a2a4a;
      margin-bottom: 20px;
      letter-spacing: -0.3px;
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13.5px;
    }
    .info-item .key { color: #8aa0cc; }
    .info-item .val { color: #1a2a4a; text-align: right; max-width: 60%; }

    .btn {
      margin-top: 32px;
      width: 100%;
      padding: 12px;
      background: #3b6ef8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }
    .btn:hover   { background: #2a5ce0; }
    .btn:active  { transform: scale(0.99); }
    .btn:disabled { background: #c5d3f5; cursor: not-allowed; }

    .updated {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #b0bedd;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="cid">is nicky on plane game?</div>
    <hr />

    <div class="status-area" id="status-area">
      <div class="loading">
        <div class="spinner"></div>
        Checking status…
      </div>
    </div>

    <button class="btn" id="refresh-btn" onclick="checkStatus()" disabled>Refresh</button>
    <div class="updated" id="updated"></div>
  </div>

  <script>
    const CID = 1778154;
    const API = 'https://data.vatsim.net/v3/vatsim-data.json';

    function timeSince(logonTime) {
      const s = Math.floor((Date.now() - new Date(logonTime)) / 1000);
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    function rows(pairs) {
      return pairs.map(([k, v]) => `
        <div class="info-item">
          <span class="key">${k}</span>
          <span class="val">${v}</span>
        </div>
      `).join('');
    }

    function renderOnline(entry, type) {
      const fp = entry.flight_plan;
      const pairs = type === 'pilot'
        ? [
            ['Callsign', entry.callsign],
            fp ? ['Route', `${fp.departure} → ${fp.arrival}`] : null,
            fp?.aircraft_short ? ['Aircraft', fp.aircraft_short] : null,
            ['Altitude', `${Number(entry.altitude).toLocaleString()} ft`],
            ['Ground speed', `${entry.groundspeed} kt`],
            ['Online for', timeSince(entry.logon_time)],
          ].filter(Boolean)
        : [
            ['Callsign', `${getFlag(entry.callsign)} ${entry.callsign}`],
            ['Frequency', entry.frequency],
            ['Online for', timeSince(entry.logon_time)],
          ];

      return `
        <div class="pill online"><span class="dot"></span> YES HE IS!</div>
        <div class="status-label">${type === 'pilot' ? 'Flying' : 'Controlling'}</div>
        <div class="info-list">${rows(pairs)}</div>
      `;
    }

    function renderOffline() {
      return `
        <div class="pill offline"><span class="dot"></span> NO HE ISN'T!</div>
        <div class="status-label" style="color:#8aa0cc;font-weight:300">He's not connected to the big v</div>
      `;
    }

    function renderError() {
      return `
        <div class="status-label" style="color:#c0392b;font-size:15px">The request failed</div>
        <p style="font-size:13px;color:#8aa0cc;margin-top:6px">No idea lol</p>
      `;
    }

    function getFlag(callsign) {
      if (callsign.startsWith("EL")) {
        return '<img src="flags/lu.png" class="flag">';
      }
      if (callsign.startsWith("EB")) {
        return '<img src="flags/be.png" class="flag">';
      }
      return '';
    }

    async function checkStatus() {
      const area = document.getElementById('status-area');
      const btn  = document.getElementById('refresh-btn');
      btn.disabled = true;
      area.innerHTML = `<div class="loading"><div class="spinner"></div>Checking status…</div>`;

      try {
        const res  = await fetch(API, { cache: 'no-store' });
        if (!res.ok) throw new Error();
        const data = await res.json();

        const pilot = data.pilots?.find(p => p.cid === CID);
        const atc   = data.controllers?.find(c => c.cid === CID);

        area.innerHTML = pilot ? renderOnline(pilot, 'pilot')
                       : atc   ? renderOnline(atc,   'atc')
                       :         renderOffline();

        const ts = data.general?.update_timestamp;
        if (ts) {
          const d = new Date(ts);
          document.getElementById('updated').textContent =
            `Last updated ${d.toUTCString().slice(5, 22)}z`;
        }
      } catch {
        area.innerHTML = renderError();
      }

      btn.disabled = false;
    }

    checkStatus();
  </script>

</body>
</html>
